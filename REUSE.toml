# SPDX-License-Identifier: 0BSD

version = 1

# JSON carries no comment syntax, so these files get their declaration here
# rather than inline.
[[annotations]]
path = ["package.json", "package-lock.json", "tsconfig.json", "studio/package.json", "studio/package-lock.json", "studio/tsconfig.json", "studio/seed/*.ndjson", "renovate.json", "biome.json", "knip.json", "lighthouserc.json", "public/manifest.webmanifest", "messages/*.json", "project.inlang/settings.json"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"

# flake.lock is nix-generated JSON; it pins the toolchain both CI and local
# shells resolve from flake.nix.
[[annotations]]
path = "flake.lock"
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"

# Catalog scores (MusicXML) are transcriptions/arrangements of public-domain or
# non-copyrightable music, dedicated to the public domain (CC0). Each is its own
# file so its license is tracked individually.
[[annotations]]
path = ["scores/*.musicxml"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "CC0-1.0"

# The curated song catalogue: scores harvested from several public-domain sources (PDMX,
# OpenScore Lieder, KernScores, Mutopia, ASAP, DCMLab, CPDL), stored as compressed .mxl.
# Each id is a content fingerprint that carries no licence, so the files are grouped into a
# subdirectory per SPDX licence and annotated one glob each. The per-piece source and
# editor credit shown to users comes from the manifest (core/attribution.ts), not here.
[[annotations]]
path = ["public/songs/cc0-1.0/*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The catalogue score contributors"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = ["public/songs/cc-by-4.0/*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The catalogue score contributors"
SPDX-License-Identifier = "CC-BY-4.0"

[[annotations]]
path = ["public/songs/cc-by-3.0/*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The catalogue score contributors"
SPDX-License-Identifier = "CC-BY-3.0"

[[annotations]]
path = ["public/songs/cc-by-2.5/*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The catalogue score contributors"
SPDX-License-Identifier = "CC-BY-2.5"

[[annotations]]
path = ["public/songs/cc-by-sa-4.0/*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The catalogue score contributors"
SPDX-License-Identifier = "CC-BY-SA-4.0"

[[annotations]]
path = ["public/songs/cc-by-sa-3.0/*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The catalogue score contributors"
SPDX-License-Identifier = "CC-BY-SA-3.0"

[[annotations]]
path = ["public/songs/cc-by-sa-2.5/*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The catalogue score contributors"
SPDX-License-Identifier = "CC-BY-SA-2.5"

[[annotations]]
path = ["public/songs/manifest.json", "public/songs/seed.json"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"

# The finger-exercise catalogue. Scales/arpeggios are generated client-side (no
# shipped files); the metadata manifest plus the curated studies are stored — the
# latter public-domain études (Hanon, Czerny, Burgmüller, …) sourced from PDMX (CC0),
# one compressed .mxl each.
[[annotations]]
path = ["public/exercises/manifest.json"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"

[[annotations]]
path = ["public/exercises/studies/*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "PDMX contributors"
SPDX-License-Identifier = "CC0-1.0"

# Generated logo art, the app-icon renders, the binary favicon, and the
# social-card image: declared here so the asset files stay untouched.
[[annotations]]
path = ["public/favicon.ico", "public/*.svg", "public/og.png", "public/icon-*.png"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"

# Story screenshot baselines: rendered from our own components by the visual
# regression suite (vitest toMatchScreenshot over the Storybook stories).
[[annotations]]
path = ["app/**/__story-shots__/**/*.png"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"
