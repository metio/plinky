version = 1

# JSON carries no comment syntax, so these files get their declaration here
# rather than inline.
[[annotations]]
path = ["package.json", "package-lock.json", "tsconfig.json", "renovate.json", "biome.json", "knip.json", "public/manifest.webmanifest"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"

# Generated logo art and the binary favicon: declared here so the asset files
# stay untouched.
[[annotations]]
path = ["public/favicon.ico", "public/*.svg"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"
