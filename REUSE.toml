version = 1

# JSON carries no comment syntax, so these files get their declaration here
# rather than inline.
[[annotations]]
path = ["package.json", "package-lock.json", "tsconfig.json", "renovate.json", "biome.json", "knip.json", "lighthouserc.json", "public/manifest.webmanifest", "messages/*.json", "project.inlang/settings.json"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"

# Catalog scores (MusicXML) are transcriptions/arrangements of public-domain or
# non-copyrightable music, dedicated to the public domain (CC0). Each is its own
# file so its license is tracked individually.
[[annotations]]
path = ["scores/*.musicxml"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "CC0-1.0"

# The curated song catalogue: public-domain solo-piano pieces imported from the
# PDMX dataset (CC0), stored as compressed .mxl, plus its generated metadata.
[[annotations]]
path = ["public/songs/*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "PDMX contributors"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = ["public/songs/manifest.json", "public/songs/seed.json"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"

# The generated finger-exercise catalogue: scales/arpeggios (non-copyrightable,
# dedicated to the public domain) packed as gzipped MusicXML, plus its metadata.
[[annotations]]
path = ["public/exercises/pack.json.gz"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = ["public/exercises/manifest.json"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"

# Generated logo art, the binary favicon, and the social-card image: declared
# here so the asset files stay untouched.
[[annotations]]
path = ["public/favicon.ico", "public/*.svg", "public/og.png"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"
