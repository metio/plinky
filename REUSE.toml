version = 1

# JSON carries no comment syntax, so these files get their declaration here
# rather than inline.
[[annotations]]
path = ["package.json", "package-lock.json", "tsconfig.json", "renovate.json", "biome.json", "knip.json", "lighthouserc.json", "public/manifest.webmanifest", "messages/*.json", "project.inlang/settings.json"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"

# Catalog scores (MusicXML) are transcriptions/arrangements of public-domain or
# non-copyrightable music, dedicated to the public domain (CC0). Each is its own
# file so its license is tracked individually.
[[annotations]]
path = ["scores/*.musicxml"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "CC0-1.0"

# The curated song catalogue: public-domain solo-piano pieces imported from the
# PDMX dataset (CC0), stored as compressed .mxl, plus its generated metadata.
[[annotations]]
path = ["public/songs/*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "PDMX contributors"
SPDX-License-Identifier = "CC0-1.0"

# Solo-keyboard pieces converted from the Mutopia Project's LilyPond sources. Mutopia's
# licence varies per piece, so dev/mutopia-harvest.py tags each filename with its licence
# bucket (mutopia-<bucket>-…) and each bucket is annotated with its SPDX id here. All
# override the PDMX credit above for their filenames.
[[annotations]]
path = ["public/songs/mutopia-cc0-*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The Mutopia Project contributors"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = ["public/songs/mutopia-by40-*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The Mutopia Project contributors"
SPDX-License-Identifier = "CC-BY-4.0"

[[annotations]]
path = ["public/songs/mutopia-by30-*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The Mutopia Project contributors"
SPDX-License-Identifier = "CC-BY-3.0"

[[annotations]]
path = ["public/songs/mutopia-by25-*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The Mutopia Project contributors"
SPDX-License-Identifier = "CC-BY-2.5"

[[annotations]]
path = ["public/songs/mutopia-bysa40-*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The Mutopia Project contributors"
SPDX-License-Identifier = "CC-BY-SA-4.0"

[[annotations]]
path = ["public/songs/mutopia-bysa30-*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The Mutopia Project contributors"
SPDX-License-Identifier = "CC-BY-SA-3.0"

[[annotations]]
path = ["public/songs/mutopia-bysa25-*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "The Mutopia Project contributors"
SPDX-License-Identifier = "CC-BY-SA-2.5"

# The KernScores keyboard corpora (craigsapp/*) — engraved by Craig Stuart Sapp and
# licensed CC-BY-NC-SA, so they override the CC0 default above for their filenames.
[[annotations]]
path = [
    "public/songs/scarlatti-keyboard-sonatas-*.mxl",
    "public/songs/mozart-piano-sonatas-*.mxl",
    "public/songs/haydn-piano-sonatas-*.mxl",
    "public/songs/joplin-*.mxl",
    "public/songs/bach-370-chorales-*.mxl",
]
precedence = "override"
SPDX-FileCopyrightText = "Craig Stuart Sapp"
SPDX-License-Identifier = "CC-BY-NC-SA-4.0"

[[annotations]]
path = ["public/songs/manifest.json", "public/songs/seed.json"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"

# The finger-exercise catalogue. Scales/arpeggios are generated client-side (no
# shipped files); the metadata manifest plus the curated studies are stored — the
# latter public-domain études (Hanon, Czerny, Burgmüller, …) sourced from PDMX (CC0),
# one compressed .mxl each.
[[annotations]]
path = ["public/exercises/manifest.json"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"

[[annotations]]
path = ["public/exercises/studies/*.mxl"]
precedence = "override"
SPDX-FileCopyrightText = "PDMX contributors"
SPDX-License-Identifier = "CC0-1.0"

# Generated logo art, the binary favicon, and the social-card image: declared
# here so the asset files stay untouched.
[[annotations]]
path = ["public/favicon.ico", "public/*.svg", "public/og.png"]
precedence = "override"
SPDX-FileCopyrightText = "The Plinky Authors"
SPDX-License-Identifier = "0BSD"
