name: Submit a score
description: Share an ABC score to be added to the Plinky catalog
title: "[Score] "
labels: ["score-submission"]
body:
  - type: markdown
    attributes:
      value: >
        Thanks for sharing a score! Paste its ABC notation below. An automated
        check looks over the basics, then a maintainer reviews it before it joins
        the catalog. Please only submit music you have the right to share.
  - type: input
    id: score-title
    attributes:
      label: Score title
      placeholder: e.g. Ode to Joy
    validations:
      required: true
  - type: textarea
    id: abc
    attributes:
      label: ABC notation
      description: "The full ABC, including the X:, T:, M:, L:, and K: headers."
      render: text
      placeholder: |
        X:1
        T:My score
        M:4/4
        L:1/4
        K:C
        C D E F | G A B c |
    validations:
      required: true
  - type: input
    id: tempo
    attributes:
      label: Tempo (BPM)
      placeholder: e.g. 90
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: A short note about the score.
  - type: input
    id: curriculum
    attributes:
      label: Curriculum (optional)
      description: If this score belongs to a curriculum, name it here.
  - type: dropdown
    id: license
    attributes:
      label: License
      description: >
        How others may use this score. CC0-1.0 is public-domain-style (most
        reusable); CC-BY needs attribution; SA adds share-alike; NC blocks
        commercial use; ND blocks derivatives.
      options:
        - "CC0-1.0"
        - "CC-BY-4.0"
        - "CC-BY-SA-4.0"
        - "CC-BY-NC-4.0"
        - "CC-BY-ND-4.0"
        - "CC-BY-NC-SA-4.0"
    validations:
      required: true
  - type: checkboxes
    id: rights
    attributes:
      label: Rights
      options:
        - label: I have the right to share this score under the license I selected.
          required: true
