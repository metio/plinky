name: Submit a score
description: Share a MusicXML score to be added to the Plinky catalog
title: "[Score] "
labels: ["score-submission"]
body:
  - type: markdown
    attributes:
      value: >
        Thanks for sharing a score! Paste its MusicXML below. An automated check
        renders it the way Plinky does, then a maintainer reviews it before it
        joins the catalog. Please only submit music you have the right to share.
  - type: input
    id: score-title
    attributes:
      label: Score title
      placeholder: e.g. Ode to Joy
    validations:
      required: true
  - type: textarea
    id: musicxml
    attributes:
      label: MusicXML
      description: >
        The full MusicXML document — a `<score-partwise>` (or `<score-timewise>`)
        element. Most notation software (MuseScore, Finale, Sibelius, Flat,
        Soundslice) can export it.
      render: xml
      placeholder: |
        <?xml version="1.0" encoding="UTF-8"?>
        <score-partwise version="4.0">
          <part-list><score-part id="P1"><part-name>Music</part-name></score-part></part-list>
          <part id="P1">
            <measure number="1">
              <attributes><divisions>1</divisions><time><beats>4</beats><beat-type>4</beat-type></time></attributes>
              <note><pitch><step>C</step><octave>4</octave></pitch><duration>1</duration><type>quarter</type></note>
            </measure>
          </part>
        </score-partwise>
    validations:
      required: true
  - type: input
    id: tempo
    attributes:
      label: Tempo (BPM)
      placeholder: e.g. 90
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: A short note about the score.
  - type: input
    id: curriculum
    attributes:
      label: Curriculum (optional)
      description: If this score belongs to a curriculum, name it here.
  - type: dropdown
    id: license
    attributes:
      label: License
      description: >
        How others may use this score. CC0-1.0 is public-domain-style (most
        reusable); CC-BY needs attribution; SA adds share-alike. Only these
        commercially-usable, derivative-friendly licences are accepted — the
        catalogue adds fingering and grading, so NonCommercial and NoDerivatives
        scores can't be admitted.
      options:
        - "CC0-1.0"
        - "CC-BY-4.0"
        - "CC-BY-SA-4.0"
    validations:
      required: true
  - type: checkboxes
    id: rights
    attributes:
      label: Rights
      options:
        - label: I have the right to share this score under the license I selected.
          required: true
