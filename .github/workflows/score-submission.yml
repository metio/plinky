name: Score submission
on:
  issues:
    types: [opened, edited]
permissions:
  issues: write
jobs:
  check:
    name: check
    # Only act on score submissions; the issue form prefixes the title.
    if: startsWith(github.event.issue.title, '[Score] ')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Validate the submitted MusicXML
        id: validate
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node .github/scripts/validate-submission.mjs
      - name: Comment and label
        # Renovate pins this to a commit digest.
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          REPORT: ${{ steps.validate.outputs.report }}
        with:
          script: |
            const valid = "${{ steps.validate.outputs.valid }}" === "true";
            const marker = "<!-- plinky-score-check -->";
            const message = [
              marker,
              process.env.REPORT,
              "",
              "_Automated check — edit the issue to run it again._",
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            // Upsert the bot's check comment so editing the issue does not pile up comments.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: message });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: message });
            }

            // Reflect the verdict in labels, creating them if they do not exist yet.
            const ensureLabel = async (name, color) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, name, color });
              }
            };
            await ensureLabel("submission-valid", "0e8a16");
            await ensureLabel("submission-needs-changes", "fbca04");

            const add = valid ? "submission-valid" : "submission-needs-changes";
            const drop = valid ? "submission-needs-changes" : "submission-valid";
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [add] });
            try {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: drop });
            } catch {
              // The label was not set; nothing to remove.
            }
