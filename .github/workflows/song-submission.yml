name: Song submission
on:
  issues:
    types: [opened, edited]
permissions:
  issues: write
jobs:
  check:
    name: check
    # Only act on song submissions; the issue form prefixes the title.
    if: startsWith(github.event.issue.title, '[Song] ')
    runs-on: ubuntu-latest
    steps:
      # Renovate pins this to a commit digest.
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";

            // Read a field from the issue form's rendered body.
            const section = (label) => {
              const re = new RegExp(
                "###\\s*" + label + "\\s*\\r?\\n([\\s\\S]*?)(?=\\r?\\n###\\s|$)",
                "i",
              );
              const match = body.match(re);
              return match ? match[1].trim() : "";
            };

            // The ABC field uses render:text, so it arrives in a fenced block.
            let abc = section("ABC notation");
            const fenced = abc.match(/^```[a-z]*\r?\n([\s\S]*?)\r?\n```$/);
            if (fenced) {
              abc = fenced[1].trim();
            }

            const problems = [];
            if (!abc || abc === "_No response_") {
              problems.push("No ABC notation was provided.");
            } else {
              if (!/^X:/m.test(abc)) {
                problems.push("Missing the `X:` reference-number header.");
              }
              if (!/^K:/m.test(abc)) {
                problems.push("Missing the `K:` key header.");
              }
              if (!/[A-Ga-g]/.test(abc)) {
                problems.push("No notes (A-G) found in the body.");
              }
            }
            const ok = problems.length === 0;

            const license = section("License");

            const marker = "<!-- plinky-song-check -->";
            const message = [
              marker,
              ok
                ? "✅ **Looks good!** The ABC has the expected headers and notes. A maintainer will review it and add it to the catalog."
                : "⚠️ **This needs a change before it can be added:**\n" +
                  problems.map((problem) => "- " + problem).join("\n"),
              license ? `\nLicense: \`${license}\`` : "",
              "",
              "_Automated check — edit the issue to run it again._",
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            // Upsert the bot's check comment so editing the issue does not pile up comments.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: message });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: message });
            }

            // Reflect the verdict in labels, creating them if they do not exist yet.
            const ensureLabel = async (name, color) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, name, color });
              }
            };
            await ensureLabel("submission-valid", "0e8a16");
            await ensureLabel("submission-needs-changes", "fbca04");

            const add = ok ? "submission-valid" : "submission-needs-changes";
            const drop = ok ? "submission-needs-changes" : "submission-valid";
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [add] });
            try {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: drop });
            } catch {
              // The label was not set; nothing to remove.
            }
