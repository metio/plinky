name: Preview
# Per-branch preview deploys to Cloudflare Pages. Production stays on GitHub Pages
# (website.yml) — this exists because GitHub Pages serves one site per repo at one
# domain, so it can't give each branch its own origin. Cloudflare Pages can, and a
# distinct origin per branch matters here: all of Plinky's state lives in localStorage
# (per-origin), so a preview must never share production's origin or it could read and
# corrupt real users' data. Each push publishes to <slug>.plinky-preview.pages.dev
# (and <slug>.preview.plinky.fun once the custom domain is attached), and records a
# GitHub Deployment so the PR shows the environment and a "View deployment" link —
# deliberately not a PR comment, which would email on every push.
#
# The build prerenders English only for speed, but still renders every language at
# runtime: build:locales always builds the all-locales root (the SPA fallback shell and
# a client bundle carrying every language), so a /de/ deep link falls back to it and
# renders in German. Only the static prerendered pages are English.
#
# One-time setup before this can run (then set the repo variable PREVIEW_ENABLED=true):
#   1. Cloudflare account → Pages → create a project named "plinky-preview"
#      (Direct Upload / no Git connection; this workflow uploads the build).
#   2. Create an API token (template: "Cloudflare Pages — Edit") and add repo secrets
#      CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.
#   3. For nice URLs: add the custom domain in the Pages project and a wildcard CNAME
#      *.preview → plinky-preview.pages.dev in plinky.fun's DNS, then set the repo
#      variable PREVIEW_DOMAIN=preview.plinky.fun. Left unset, the URLs are the free
#      <slug>.plinky-preview.pages.dev, which need no DNS.
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
      - gh-pages
      - renovate/**
permissions:
  contents: read
  # Record a native GitHub Deployment (not a PR comment) so the PR shows the
  # environment and a "View deployment" link without emailing on every push.
  deployments: write
concurrency:
  # One preview build per branch at a time; a newer push supersedes an in-flight one.
  group: preview-${{ github.ref_name }}
  cancel-in-progress: true
jobs:
  deploy:
    name: Build & deploy preview
    # Inert until Cloudflare is wired up, so merging the workflow can't red-fail every
    # branch push in the meantime. Flip PREVIEW_ENABLED=true once secrets + project exist.
    if: ${{ vars.PREVIEW_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command npm ci
      - name: Add the Mock Service Worker script
        # Previews answer Sanity queries from MSW (the preview origins are not on
        # Sanity's CORS allowlist), so the worker script ships with the build.
        run: nix develop --command npx msw init public
      - name: Build (English prerender, all languages at runtime)
        # Set PLINKY_LOCALES to a comma list to prerender more languages.
        run: nix develop --command npm run build:locales
        env:
          PLINKY_LOCALES: en
          VITE_PREVIEW_MOCKS: "1"
          # The adapters stay silent without a project id; previews never reach
          # the real API (MSW answers first), so a placeholder works when the
          # repo variable is unset.
          VITE_SANITY_PROJECT_ID: ${{ vars.VITE_SANITY_PROJECT_ID || 'preview0' }}
          VITE_SANITY_DATASET: ${{ vars.VITE_SANITY_DATASET || 'production' }}
      - name: Add SPA fallback
        # Cloudflare Pages serves 404.html for an unmatched path, so a deep-link refresh
        # (or an unprerendered locale) lands on the shell and the client router takes over.
        run: cp build/client/__spa-fallback.html build/client/404.html
      - name: Derive a preview slug from the branch
        id: slug
        # A branch ref isn't a valid DNS label (slashes, case, length), so normalise it:
        # lower-case, non-alphanumerics to hyphens, trimmed, capped at Cloudflare's 28-char
        # alias limit. Readable and predictable; the immutable per-deploy *.pages.dev URL
        # is the collision-proof backstop if two branches ever slug the same.
        run: |
          slug=$(printf '%s' "${GITHUB_REF_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-28 \
            | sed -E 's/-+$//')
          domain="${{ vars.PREVIEW_DOMAIN }}"
          [ -n "$domain" ] || domain="plinky-preview.pages.dev"
          {
            echo "slug=$slug"
            echo "url=https://$slug.$domain"
          } >> "$GITHUB_OUTPUT"
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          nix develop --command npx --yes wrangler@4 pages deploy build/client
          --project-name=plinky-preview
          --branch="${{ steps.slug.outputs.slug }}"
          --commit-dirty=true
      - name: Record the preview deployment
        env:
          GH_TOKEN: ${{ github.token }}
          URL: ${{ steps.slug.outputs.url }}
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          {
            echo "### 🔎 Preview deployed"
            echo ""
            echo "[$URL]($URL)"
          } >> "$GITHUB_STEP_SUMMARY"
          # A native GitHub Deployment rather than a PR comment: the PR then shows the
          # environment and a "View deployment" link, and no comment email lands on every
          # push. auto_merge off and no required contexts so it is created immediately for
          # this exact commit; transient so GitHub retires the environment once a newer
          # deploy supersedes it.
          cat > deployment.json <<JSON
          {
            "ref": "${GITHUB_SHA}",
            "environment": "preview/${SLUG}",
            "auto_merge": false,
            "required_contexts": [],
            "transient_environment": true,
            "production_environment": false,
            "description": "Cloudflare Pages preview"
          }
          JSON
          id=$(gh api "repos/${GITHUB_REPOSITORY}/deployments" --input deployment.json --jq '.id')
          gh api "repos/${GITHUB_REPOSITORY}/deployments/${id}/statuses" \
            -f state=success \
            -f environment_url="${URL}" \
            -f log_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -f description="Preview is live" >/dev/null
