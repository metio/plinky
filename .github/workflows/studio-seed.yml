name: Seed Studio Content
# Imports the help-page text and alt (seed/help.ndjson, every locale) into Sanity.
#
# Manual, and a last resort: the Studio is the source of truth for the help content
# now, so this is only for a deliberate restore from the git backup. The import
# replaces each block wholesale — it overwrites everything an editor wrote in the
# Studio, body text included — so it must never run on its own.
#
# It also drops the pictures, which live only in Sanity as uploaded assets. After a
# restore, dispatch "Help Screenshots" by hand to re-attach them and re-patch the
# alt text from this same file; neither runs automatically any more.
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  seed:
    name: Import seed content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - name: Import help content
        working-directory: studio
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.VITE_SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.VITE_SANITY_DATASET }}
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_EDITOR_TOKEN }}
        run: |
          nix develop ../ --command bash -c \
            "npm ci && npx sanity dataset import seed/help.ndjson $SANITY_STUDIO_DATASET --replace"
