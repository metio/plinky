name: Preview cleanup
# Tears down a branch's Cloudflare Pages preview when that branch is deleted on GitHub.
# preview.yml publishes each push to <slug>.plinky-preview.pages.dev and records a GitHub
# Deployment under the preview/<slug> environment; nothing there is bound to the branch's
# lifetime, so a deleted branch would otherwise leave its preview deployments and its PR
# environment hanging around forever. GitHub fires the `delete` event once per removed
# branch (after a merge-and-delete, or a manual delete), which is the trigger here.
#
# The slug derivation MUST match preview.yml exactly, or this would look for deployments
# under the wrong branch alias and delete nothing.
on:
  delete:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch name whose preview to remove (for a manual re-run)
        required: true
permissions:
  contents: read
  # Retire the transient GitHub Deployment environment the preview created.
  deployments: write
concurrency:
  # Serialise cleanups per branch so two rapid deletes can't race the Cloudflare API.
  group: preview-cleanup-${{ github.event.ref || github.event.inputs.branch }}
jobs:
  cleanup:
    name: Remove preview deployments
    # `delete` also fires for tags; only branch deletions have a preview. Stay inert until
    # Cloudflare is wired up, mirroring preview.yml's PREVIEW_ENABLED guard.
    if: >-
      ${{ vars.PREVIEW_ENABLED == 'true'
          && (github.event_name == 'workflow_dispatch' || github.event.ref_type == 'branch') }}
    runs-on: ubuntu-latest
    steps:
      - name: Derive the preview slug from the deleted branch
        id: slug
        # Same normalisation as preview.yml: lower-case, non-alphanumerics to hyphens,
        # trimmed, capped at Cloudflare's 28-char alias limit.
        env:
          BRANCH: ${{ github.event.inputs.branch || github.event.ref }}
        run: |
          slug=$(printf '%s' "${BRANCH}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-28 \
            | sed -E 's/-+$//')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
      - name: Delete Cloudflare Pages deployments for the branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          set -euo pipefail
          project=plinky-preview
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${project}/deployments"
          auth=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")

          # Walk the paginated deployment list and collect every deployment id whose
          # source branch matches this slug. Direct-Upload deploys store the branch under
          # deployment_trigger.metadata.branch.
          ids=()
          page=1
          while :; do
            resp=$(curl -fsS "${auth[@]}" "${api}?per_page=25&page=${page}")
            count=$(printf '%s' "$resp" | jq '.result | length')
            [ "$count" -eq 0 ] && break
            mapfile -t page_ids < <(printf '%s' "$resp" \
              | jq -r --arg b "$SLUG" \
                  '.result[] | select(.deployment_trigger.metadata.branch == $b) | .id')
            ids+=("${page_ids[@]}")
            [ "$count" -lt 25 ] && break
            page=$((page + 1))
          done

          if [ "${#ids[@]}" -eq 0 ]; then
            echo "No preview deployments found for branch slug '${SLUG}'."
            exit 0
          fi

          echo "Deleting ${#ids[@]} preview deployment(s) for '${SLUG}':"
          for id in "${ids[@]}"; do
            # force=true is required to remove the deployment currently backing the branch
            # alias; without it Cloudflare refuses to delete the live alias.
            curl -fsS -X DELETE "${auth[@]}" "${api}/${id}?force=true" >/dev/null
            echo "  deleted ${id}"
          done
      - name: Retire the GitHub Deployment environment
        env:
          GH_TOKEN: ${{ github.token }}
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          set -euo pipefail
          env_name="preview/${SLUG}"
          # Deleting the environment also removes its deployment records from the PR/repo.
          # Needs admin scope on the token; tolerate a 403 so the Cloudflare teardown above
          # still counts as a successful cleanup on repos where the default token can't.
          if gh api -X DELETE "repos/${GITHUB_REPOSITORY}/environments/${env_name}" >/dev/null 2>&1; then
            echo "Removed GitHub environment '${env_name}'."
          else
            echo "Could not delete GitHub environment '${env_name}' (likely token scope); skipping."
          fi
