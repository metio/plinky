name: Preview cleanup
# Tears down branch previews on Cloudflare Pages. preview.yml publishes each push to
# <slug>.plinky-preview.pages.dev and records a GitHub Deployment under the preview/<slug>
# environment; nothing there is bound to the branch's lifetime, so a deleted branch would
# otherwise leave its preview deployments and its PR environment hanging around forever.
#
# Two entry points:
#   * delete event — fires once per removed branch (merge-and-delete or manual delete) and
#     cleans exactly that branch. This only covers branches deleted AFTER this workflow
#     landed on the default branch: GitHub runs the default branch's copy at delete time
#     and never replays past deletions.
#   * workflow_dispatch — clean one named branch, or (prune_orphans) reconcile both the
#     Cloudflare deployments and the preview/* GitHub environments against the set of live
#     branches, removing everything whose branch no longer exists on GitHub — including
#     environments whose deployment is already gone. One run handles every pruning action;
#     it is the backfill for branches deleted before this existed, and a periodic drift
#     cleanup.
#
# The slug derivation MUST match preview.yml exactly, or this would look under the wrong
# branch alias and delete nothing.
on:
  delete:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch whose preview to remove (leave empty to prune orphans)
        required: false
      prune_orphans:
        description: Delete previews for every branch no longer on GitHub
        type: boolean
        default: false
permissions:
  contents: read
  # Retire the transient GitHub Deployment environments the previews created.
  deployments: write
concurrency:
  # Serialise per target so two rapid runs can't race the Cloudflare API; a shared 'prune'
  # slot keeps sweeps from overlapping each other.
  group: preview-cleanup-${{ github.event.ref || github.event.inputs.branch || 'prune' }}
jobs:
  cleanup:
    name: Remove preview deployments
    # `delete` also fires for tags; only branch deletions have a preview. Stay inert until
    # Cloudflare is wired up, mirroring preview.yml's PREVIEW_ENABLED guard.
    if: >-
      ${{ vars.PREVIEW_ENABLED == 'true'
          && (github.event_name == 'workflow_dispatch' || github.event.ref_type == 'branch') }}
    runs-on: ubuntu-latest
    steps:
      - name: Plan the cleanup
        id: plan
        env:
          EVENT: ${{ github.event_name }}
          DELETED_REF: ${{ github.event.ref }}
          INPUT_BRANCH: ${{ github.event.inputs.branch }}
          PRUNE: ${{ github.event.inputs.prune_orphans }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Same normalisation as preview.yml: lower-case, non-alphanumerics to hyphens,
          # trimmed, capped at Cloudflare's 28-char alias limit.
          slugify() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' \
              | cut -c1-28 \
              | sed -E 's/-+$//'
          }

          if [ "$EVENT" = delete ]; then
            mode=single
            target=$(slugify "$DELETED_REF")
          elif [ "${PRUNE:-false}" = true ]; then
            mode=prune
          elif [ -n "${INPUT_BRANCH:-}" ]; then
            mode=single
            target=$(slugify "$INPUT_BRANCH")
          else
            echo "::error::Provide a branch name or enable prune_orphans." >&2
            exit 1
          fi

          {
            echo "mode=$mode"
            echo "target=${target:-}"
          } >> "$GITHUB_OUTPUT"

          if [ "$mode" = prune ]; then
            # Slug every branch that still exists on GitHub; the execute step keeps those
            # and deletes deployments for any slug not in this set. Live main/gh-pages/
            # renovate branches are in the set, so they're protected (they carry no preview
            # anyway — preview.yml ignores them). Capture into a variable so a failed API
            # call aborts here under set -e rather than yielding an empty keep-set.
            branches=$(gh api "repos/${GITHUB_REPOSITORY}/branches" --paginate --jq '.[].name')
            keep=""
            while read -r name; do
              [ -n "$name" ] || continue
              keep="$keep $(slugify "$name")"
            done <<< "$branches"
            keep=$(printf '%s' "$keep" | tr ' ' '\n' | sort -u | tr '\n' ' ')
            # Every repo has at least its default branch, so an empty keep-set means the
            # enumeration failed — refuse to prune rather than delete every deployment.
            if [ -z "${keep// /}" ]; then
              echo "::error::No live branches enumerated; refusing to prune." >&2
              exit 1
            fi
            echo "keep=$keep" >> "$GITHUB_OUTPUT"
          fi
      - name: Delete matching deployments and retire environments
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Deleting an environment needs repo-admin, which the built-in GITHUB_TOKEN
          # cannot be granted (its permissions block has no administration scope). Supply
          # PREVIEW_CLEANUP_TOKEN — a PAT with admin (fine-grained: Administration read/write;
          # classic: repo) — to enable it. Absent, this falls back to the built-in token and
          # the environment deletions are skipped (best-effort), while the Cloudflare
          # teardown still runs in full.
          GH_TOKEN: ${{ secrets.PREVIEW_CLEANUP_TOKEN || github.token }}
          MODE: ${{ steps.plan.outputs.mode }}
          TARGET: ${{ steps.plan.outputs.target }}
          KEEP: ${{ steps.plan.outputs.keep }}
        run: |
          set -euo pipefail
          project=plinky-preview
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${project}/deployments"
          auth=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")

          # True when a slug still has a live GitHub branch (prune mode).
          kept() {
            case " ${KEEP:-} " in *" $1 "*) return 0 ;; *) return 1 ;; esac
          }

          # Collect the ids to delete in one read-only pass FIRST. Deleting while paging
          # would shrink the list under offset pagination and skip deployments; gathering
          # everything before deleting keeps the traversal stable. Direct-Upload deploys
          # store the source branch under deployment_trigger.metadata.branch (the slug).
          targets=()
          page=1
          while :; do
            resp=$(curl -fsS "${auth[@]}" "${api}?per_page=25&page=${page}")
            count=$(printf '%s' "$resp" | jq '.result | length')
            [ "$count" -eq 0 ] && break
            while IFS=$'\t' read -r id branch; do
              [ -n "$id" ] || continue
              if [ "$MODE" = single ]; then
                [ "$branch" = "$TARGET" ] || continue
              else
                # Skip deployments with no branch metadata, and any branch still on GitHub.
                [ -n "$branch" ] || continue
                kept "$branch" && continue
              fi
              targets+=("${id}"$'\t'"${branch}")
            done < <(printf '%s' "$resp" \
              | jq -r '.result[] | [.id, (.deployment_trigger.metadata.branch // "")] | @tsv')
            [ "$count" -lt 25 ] && break
            page=$((page + 1))
          done

          # force=true is required to remove the deployment currently backing a branch
          # alias; without it Cloudflare refuses to delete the live alias.
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No Cloudflare deployments to delete."
          else
            for entry in "${targets[@]}"; do
              id=${entry%%$'\t'*}
              branch=${entry#*$'\t'}
              curl -fsS -X DELETE "${auth[@]}" "${api}/${id}?force=true" >/dev/null
              echo "  deleted deployment ${id} (branch ${branch})"
            done
            echo "Deleted ${#targets[@]} Cloudflare deployment(s)."
          fi

          # Retire the transient GitHub Deployment environments; this also clears their
          # deployment records from the PR. In prune mode reconcile the FULL set of
          # preview/* environments against the keep-set, so orphans whose Cloudflare
          # deployment is already gone are removed too — one run handles every pruning
          # action. In single mode just the one target. Needs the admin-scoped
          # PREVIEW_CLEANUP_TOKEN; with only the built-in token these 403 and are skipped —
          # tolerated, since the Cloudflare teardown above still counts as a cleanup.
          env_slugs=()
          if [ "$MODE" = single ]; then
            [ -n "${TARGET:-}" ] && env_slugs+=("$TARGET")
          else
            while read -r name; do
              slug=${name#preview/}
              [ -n "$slug" ] || continue
              kept "$slug" && continue
              env_slugs+=("$slug")
            done < <(gh api "repos/${GITHUB_REPOSITORY}/environments" --paginate \
              --jq '.environments[].name | select(startswith("preview/"))')
          fi

          if [ "${#env_slugs[@]}" -eq 0 ]; then
            echo "No GitHub environments to retire."
            exit 0
          fi
          for slug in "${env_slugs[@]}"; do
            env_name="preview/${slug}"
            # The environments API takes the name as a single URL-encoded path segment, so
            # the slash in preview/<slug> MUST be %2F — passed literally it resolves to a
            # different, missing route and 404s. Surface the real API error rather than
            # blaming token scope, so a genuine 403 (missing admin PAT) is distinguishable.
            if err=$(gh api -X DELETE "repos/${GITHUB_REPOSITORY}/environments/preview%2F${slug}" 2>&1); then
              echo "Removed GitHub environment '${env_name}'."
            else
              echo "Could not delete GitHub environment '${env_name}': ${err//$'\n'/ }"
            fi
          done
