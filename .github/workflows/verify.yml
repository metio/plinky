name: Verify
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
# In the Playwright container, localhost resolves to ::1 (IPv6) first, so the
# prerender's internal server and its own requests can land on different stacks
# and the fetch is refused. Prefer IPv4 everywhere so both bind and connect on
# 127.0.0.1; harmless on the non-container runners.
env:
  NODE_OPTIONS: --dns-result-order=ipv4first
jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Check bundle size
        run: npm run size
  browser:
    name: browser
    runs-on: ubuntu-latest
    # Run in Playwright's own image — the same one the dev container builds on — so
    # the browsers and their system libraries are already present. This avoids a
    # `playwright install --with-deps`, whose apt step breaks when a preconfigured
    # runner repository (e.g. packages.microsoft.com) returns 403. Keep the tag in
    # step with the `playwright` dependency in package.json.
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Node and the browsers come from the image; no setup-node needed.
      - run: npm ci
      - run: npm run test:browser
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Node and the browsers come from the image; no setup-node needed.
      - run: npm ci
      # Fails when any project's coverage drops below the thresholds pinned in
      # vitest.config.ts, so the ratchet only moves up.
      - run: npm run coverage
  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # Prerendered routes are served from build/client; deep links need the SPA
      # fallback, matching how GitHub Pages serves the site.
      - run: cp build/client/__spa-fallback.html build/client/404.html
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          configPath: ./lighthouserc.json
          temporaryPublicStorage: true
  accessibility-light:
    name: accessibility-light
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Node and the browsers come from the image; no setup-node needed.
      - run: npm ci
      - run: npm run a11y:light
  accessibility-dark:
    name: accessibility-dark
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Node and the browsers come from the image; no setup-node needed.
      - run: npm ci
      # axe-core in both themes is the accessibility gate — Lighthouse audits only
      # light mode, so dark-mode contrast would otherwise go unchecked.
      - run: npm run a11y:dark
  biome:
    name: biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx biome ci
  knip:
    name: knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run knip
  bake-check:
    name: bake-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # The catalogue's grades must match the octiles of the committed song costs, so a
      # dedup/import that forgot `npm run songs:bake` can't ship inconsistent grades.
      - run: npm run songs:bake -- --check
  nav:
    name: nav
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      # Pure source analysis (no dependencies), so it skips the install step: a new
      # feature can't bury a page deeper than the navigation-depth budget.
      - run: npm run nav
  arch:
    name: arch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Enforce the layered architecture: dependencies point strictly downward and
      # no cycles form. The contract lives in .dependency-cruiser.cjs.
      - run: npm run arch
  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1
  markdown:
    name: markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
        with:
          globs: "**/*.md"
  yaml:
    name: yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: pipx install yamllint && yamllint .
  github-actions:
    name: github-actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          fail_on_error: true
          filter_mode: nofilter
  reuse:
    name: reuse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6
  verify:
    # Single required check: mark only this one required in branch protection and
    # new jobs are covered automatically.
    name: Verify
    needs: [build, browser, coverage, lighthouse, accessibility-light, accessibility-dark, biome, knip, bake-check, nav, arch, typos, markdown, yaml, github-actions, reuse]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify every job succeeded or skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          bad=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key)=\(.value.result)"')
          [ -z "$bad" ] || { echo "::error::$bad"; exit 1; }
