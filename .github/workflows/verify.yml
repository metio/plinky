name: Verify
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  frontend:
    # The shared Vite/React pipeline (build, browser + coverage, biome lint,
    # knip, a11y light/dark, lighthouse, and the metio lint gate: reuse, typos,
    # yamllint, actionlint, markdownlint), run through this repo's flake devShell.
    # Its `detect` job enables each gate from this repo's package.json scripts.
    # Named "Frontend" so its checks read "Frontend / build", "Frontend / browser", …
    name: Frontend
    uses: metio/ci/.github/workflows/frontend.yml@127ffed409bdfd53a69f5aab03d83981e0485531 # 2026.7.6100610
    with:
      # Node returns DNS records verbatim, so a bare `localhost` can resolve to
      # ::1 first — the prerender's internal server and its own fetch would then
      # land on different stacks and the request is refused. Force IPv4.
      node-options: --dns-result-order=ipv4first
      # Size and lighthouse are per-visitor budgets: build one locale (tree-shaken
      # to its own language) so they measure what a single language ships. The
      # deploy builds every locale and merges them (npm run build:locales). The
      # per-locale invocation lives in the ci-build flake wrapper, so this and a
      # local `nix develop --command ci-build` stay one definition.
      build-command: ci-build
  bake-check:
    name: bake-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command npm ci
      # The catalogue's grades must match the octiles of the committed song costs, so a
      # dedup/import that forgot `npm run songs:bake` can't ship inconsistent grades.
      - run: nix develop --command ci-bake-check
  nav:
    name: nav
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      # Pure source analysis (no dependencies), so it skips the install step: a new
      # feature can't bury a page deeper than the navigation-depth budget.
      - run: nix develop --command ci-nav
  arch:
    name: arch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command npm ci
      # Enforce the layered architecture: dependencies point strictly downward and
      # no cycles form. The contract lives in .dependency-cruiser.cjs.
      - run: nix develop --command ci-arch
  i18n:
    name: i18n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      # Pure source analysis (no dependencies), so it skips the install step: every
      # locale must carry every base-locale message, so a new string can't ship
      # untranslated and silently fall back to English.
      - run: nix develop --command ci-messages-check
  ci-parity:
    name: ci-parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      # Pure source analysis (no dependencies): every gate job must run through a
      # ci-* wrapper defined in flake.nix, so a local `nix develop --command
      # ci-<name>` runs exactly what CI runs.
      - run: nix develop --command ci-parity
  verify:
    # Single required check: mark only this one required in branch protection and
    # new jobs are covered automatically.
    name: Verify
    needs: [frontend, bake-check, nav, arch, i18n, ci-parity]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify every job succeeded or skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          bad=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key)=\(.value.result)"')
          [ -z "$bad" ] || { echo "::error::$bad"; exit 1; }
