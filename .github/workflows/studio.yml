name: Deploy Studio
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/studio.yml
      - studio/**
permissions:
  contents: read
concurrency:
  # Serialize deploys; queue rather than cancel so an in-flight one finishes.
  group: studio
  cancel-in-progress: false
jobs:
  deploy:
    name: Deploy Sanity Studio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - name: Deploy studio
        working-directory: studio
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.VITE_SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.VITE_SANITY_DATASET }}
          SANITY_STUDIO_HOSTNAME: plinky-fun
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_DEPLOY_TOKEN }}
        run: |
          nix develop ../ --command bash -c 'npm ci && npm run deploy'
