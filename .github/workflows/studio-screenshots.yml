name: Help Screenshots
# The help page's pictures are a function of the app, so they follow main rather
# than someone remembering. A stale screenshot never fails anything — it just
# quietly shows a UI that no longer exists — so noticing one can't be the plan.
# The trigger mirrors the deploy's: if a change is worth publishing, its pictures
# are worth re-shooting. Re-shooting an unchanged page is close to free — Sanity
# addresses assets by content hash, so identical bytes reuse the existing asset
# rather than piling up new ones.
#
# The seed carries the alt text this run patches alongside each picture, so a seed
# edit re-shoots too. Importing the seed itself stays manual (Seed Studio Content),
# because that import replaces each block wholesale and would overwrite anything
# written in the Studio.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/studio-screenshots.yml
      - dev/help-screenshots.mjs
      - studio/seed/help.ndjson
      - app/**
      - core/**
      - messages/**
      - public/**
      - package.json
      - package-lock.json
      - vite.config.ts
      - react-router.config.ts
      - tsconfig.json
permissions:
  contents: read
concurrency:
  # One run at a time: two merges in quick succession would otherwise interleave
  # their patches across the ten blocks. Cancel rather than queue — the newer main
  # is the one the pictures should show, and it re-patches every block anyway.
  group: help-screenshots
  cancel-in-progress: true
jobs:
  screenshots:
    name: Screenshot the app into the help blocks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - name: Build the site
        run: nix develop --command bash -c "npm ci && ci-build"
      - name: Screenshot, upload, and patch the help blocks
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.VITE_SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.VITE_SANITY_DATASET }}
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_EDITOR_TOKEN }}
        run: nix develop --command node dev/help-screenshots.mjs
