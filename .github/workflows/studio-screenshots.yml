name: Help Screenshots
# Screenshots the app into the help page's picture blocks, patching each block's
# image + alt text (body text is never touched).
#
# Manual only. The Studio is the source of truth for the help content — an editor
# curates the pictures and alt text there — so this must not run on its own: an
# automatic re-shoot on every deploy would overwrite those edits. Run it by hand
# to refresh the pictures after a UI change, accepting that, left alone, they can
# drift from the current UI. Sanity addresses assets by content hash, so
# re-shooting an unchanged page reuses the existing asset rather than piling up
# new ones. A full content restore from git is the separate, also-manual
# "Seed Studio Content".
on:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  # One run at a time so two manual runs can't interleave their patches across the
  # ten blocks; the later run's pictures are the ones to keep.
  group: help-screenshots
  cancel-in-progress: true
jobs:
  screenshots:
    name: Screenshot the app into the help blocks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - name: Build the site
        run: nix develop --command bash -c "npm ci && ci-build"
      - name: Screenshot, upload, and patch the help blocks
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.VITE_SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.VITE_SANITY_DATASET }}
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_EDITOR_TOKEN }}
        run: nix develop --command node dev/help-screenshots.mjs
