# A tuplet is a music term (triplets, quintuplets, …), not a misspelling of
# "tuple".
[default.extend-words]
tuplet = "tuplet"
tuplets = "tuplets"
# "The Weeknd" is a recording artist in the copyright denylist, not a misspelling.
weeknd = "weeknd"
# Handel — the public-domain composer in the allowlist, not "handle".
handel = "handel"
# O'Carolan — Turlough O'Carolan, the public-domain composer in the allowlist.
carolan = "carolan"
# Weill — Kurt Weill, the public-domain composer in the allowlist, not "will".
weill = "weill"
# "ND" is the NoDerivatives token in SPDX licence codes (CC-BY-ND-4.0), not "AND".
nd = "nd"
# "anonymus" is a real corpus spelling of an unnamed composer that the person-page
# canonicalization must recognize — the alias's whole job is mapping it to
# "Anonymous".
anonymus = "anonymus"
# "ist" is German ("is"), kept verbatim in the machine-translation notice's prevail
# clause "maßgeblich ist die deutsche Fassung", which every translated legal page —
# including the checked English base — carries word for word.
ist = "ist"

# The translation catalogs and the song catalogue are intentionally in many
# languages, and the imported PDMX manifest holds real-world titles/composers plus
# content-addressed (CID) ids whose letter runs read as misspellings. typos only
# knows English, so it would flag legitimate foreign words and identifiers. The
# English message base stays checked. The LICENSES texts are verbatim legal
# documents (the CC 2.5/3.0 deeds even carry an official "MERCHANTIBILITY" typo) and
# must not be altered.
#
# The help seed carries all 26 locales in one NDJSON file, so — unlike messages/,
# where the English base can stay checked on its own — there is no way to spell-check
# its English without also flagging the other 25 languages.
# The Impressum and Datenschutzerklärung are German legal documents (§ 5 DDG /
# GDPR); the operator's name/address and the German page titles stay literal in the
# route components — typos only knows English, so it flags those legitimate German
# words. The prose itself now lives in messages/ (the English base stays checked);
# the German is authoritative and every other locale is a machine translation.
[files]
extend-exclude = [
    "messages/*",
    "!messages/en.json",
    "core/helpContent.ts",
    "songs/*",
    "scores/*",
    "public/songs/*",
    "public/exercises/**",
    "LICENSES/*",
    "app/routes/impressum.tsx",
    "app/routes/impressum.test.tsx",
    "app/routes/datenschutz.tsx",
    "app/routes/datenschutz.test.tsx",
]
