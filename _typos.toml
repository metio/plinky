# A tuplet is a music term (triplets, quintuplets, …), not a misspelling of
# "tuple".
[default.extend-words]
tuplet = "tuplet"
tuplets = "tuplets"

# The translation catalogs and the song catalog are intentionally in many
# languages — and the songs also hold ABC notation, whose note runs (BA, ded, …)
# read as misspellings. typos only knows English, so it would flag legitimate
# foreign words and notation. The English message base stays checked.
[files]
extend-exclude = ["messages/*", "!messages/en.json", "songs/*", "scores/*"]
